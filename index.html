<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference-ticket-generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="src/output.css">
</head>
<body>
    <div class="h-screen overflow-hidden">
   <section class="">
    <img src="images/logo-full.svg" alt="" class="section">
   </section>
   <section class="flex justify-end">
     <div class="text-center pt-12">
        <h1 class="text-4xl text-white">
            Congrats, <span class="gradient">Jonatan Kristof!</span> <br>
            Your ticket is ready.
        </h1>
        <p class="text-white text-sm pt-5 tracking-widest">
            We've emailed your ticket to <br>
            <span><a href="http://mail.com" class="text-orange-700">jonatan@gmail.com</a></span> and will send updates in <br>
            the run up to the event.
        </p>
     </div>
      <img src="images/pattern-squiggly-line-top.svg" alt="">
   </section>
<section class="flex justify-start space-x-">
   
    <img src="images/pattern-squiggly-line-bottom-desktop.svg" alt="" class="size-[30em] mt-0">
    <div class="flex">
        <img src="images/pattern-ticket.svg" alt="" class="size-96 relative bottom-16">
        <img src="images/pattern-circle.svg" alt="" class="size-32 relative top-16 right-5">
    </div>


     <di class="text-white relative right-[36%]"> 
        <div class="mt-16">
            <img src="images/logo-full.svg" alt="" class="">
        <small class="pl-12 tracking-wider">Jan 31, 2025 / Austin, TX</small>
        </div>
        <div class="mt-6 flex gap-5 items-center">
            <img src="images/image-avatar.jpg" alt="" class="size-12 rounded-md">
                <div class="">
                    <h1 class="font-bold leading-3">Jonatan Kristof</h1>
                    <div class="flex gap-1">
                        <img src="images/icon-github.svg" alt="" class="size-5"><small class="text-gray-300 leading-6">@jonatankristof0101</small>
                    </div>
                </div>
                <p class="text-gray-400 rotate-90 relative bottom-10 left-12 text-2xl">#01609</p>
        </div>
    </div>


</section>
    </div>
   <script src="index.js"></script>
</body>
</html>
